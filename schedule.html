<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연세사랑모아 순번 - 운영관리팀</title>
    <style>
        :root {
            --bg-dark: #212529;
            --bg-medium: #495057;
            --bg-light: #F8F9FA;
            --text-dark: #212529;
            --text-light: #F8F9FA;
            --text-muted: #6C757D;
            --border-color: #DEE2E6;
            --font-main: 'Noto Sans KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --primary-color: #007BFF; /* 강조색 */
            --success-color: #28a745; /* 완료색 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-light);
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            max-width: 1600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* 네비게이션 탭 스타일 */
        .nav-tabs {
            display: flex;
            list-style: none;
            background: #ffffff;
            padding: 0 20px;
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
        }
        .nav-tabs li a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-tabs li a:hover {
            color: var(--text-dark);
        }
        .nav-tabs li.active a {
            color: var(--bg-dark);
            border-bottom-color: var(--bg-dark);
        }

        .page-header {
            background: var(--bg-dark);
            color: var(--text-light);
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        .page-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .page-header h2 { font-size: 1.3rem; opacity: 0.9; font-weight: 400; }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white; border: none; padding: 10px 20px; border-radius: 25px;
            text-decoration: none; font-weight: 600; transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .notice-below {
            margin: 20px auto 0;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            opacity: 0.8;
            border-radius: 8px;
            padding: 12px 16px;
            max-width: 800px;
            font-size: 0.8rem;
            line-height: 1.4;
            text-align: center;
            border-left: 4px solid var(--text-muted);
            white-space: normal;
        }

        .progress-section {
            padding: 20px 40px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-color);
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .progress-card {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .progress-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .progress-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
            background: #ffffff;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            table-layout: fixed; /* 칸 너비 고정 */
        }

        .schedule-table th {
            background: var(--bg-light);
            color: var(--text-dark);
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
        }

        .schedule-table td {
            padding: 15px 5px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            vertical-align: top;
            border-right: 1px solid var(--border-color);
        }
        .schedule-table td:last-child { border-right: none; }
        .schedule-table tbody tr:last-child td { border-bottom: none; }

        .person-column {
            width: 20%; /* 5명이므로 다시 20%로 수정 */
            position: relative;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px 0;
        }

        .checkbox-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 5px;
            border-radius: 10px;
            transition: all 0.2s ease;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            position: relative;
            width: 95%;
            margin: 0 auto;
        }

        .checkbox-item:hover {
            background: #e9ecef;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            transform: scale(1.2);
            accent-color: var(--primary-color);
        }

        .mini-memo {
            width: 100%;
            max-width: 90%;
            padding: 8px 5px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
            font-family: var(--font-main);
        }

        .mini-memo:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0,123,255, 0.1);
        }

        .mini-memo::placeholder {
            color: #adb5bd;
            font-size: 0.75rem;
        }

        .checkbox-item.completed {
            background: #e6f7ec;
            border-color: var(--success-color);
        }
        .checkbox-item.completed .mini-memo {
            background: #f8fff9;
            border-color: var(--success-color);
        }

        .controls-section {
            padding: 20px 40px;
            background: var(--bg-light);
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .control-btn {
            background: var(--bg-dark);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .control-btn:hover {
            background: var(--bg-medium);
            transform: translateY(-2px);
        }

        .control-btn.save {
            background: var(--success-color);
            color: white;
        }
        .control-btn.save:hover { background: #218838; }

        .control-btn.reset {
            background: #dc3545;
            color: white;
        }
        .control-btn.reset:hover { background: #c82333; }


        .save-feedback {
            position: fixed; top: 20px; right: 20px; background: var(--bg-dark); color: var(--text-light); padding: 15px 25px;
            border-radius: 8px; font-weight: 600; transform: translateX(400px); transition: transform 0.3s ease;
            z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .save-feedback.show { transform: translateX(0); }

        .item-number {
            position: absolute;
            top: 5px;
            left: 5px;
            background: var(--bg-medium);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .checkbox-item.completed .item-number {
            background: var(--success-color);
        }

        @media (max-width: 1024px) {
            body { padding: 10px; }
            .page-container { margin: 0; }
            .table-container { padding: 5px; overflow-x: scroll; }
            .schedule-table { table-layout: auto; min-width: 800px; } 
            .schedule-table th,
            .schedule-table td { padding: 10px 5px; font-size: 0.9rem; }
            .checkbox-group { gap: 10px; }
            .mini-memo { font-size: 0.8rem; padding: 6px 4px; }
            .progress-section, .controls-section { padding: 15px; }
            .control-btn { padding: 10px 20px; font-size: 0.9rem; margin: 5px; }
            .notice-below { white-space: normal; max-width: 95%; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <ul class="nav-tabs">
            <li><a href="handover.html">인수인계</a></li>
            <li><a href="docs.html">독스 계정 정보</a></li>
            <li><a href="company.html">업체 정보</a></li>
            <li class="active"><a href="schedule.html">연세사랑모아 순번</a></li>
            <li><a href="cafe.html">집중관리 카페</a></li>
        </ul>
    
        <div class="page-header">
            <a href="index.html" class="back-btn">← 메인으로</a>
            <h1>운영관리팀</h1>
            <h2>연세사랑모아 순번</h2>
            <div class="notice-below">
                위드맘케어, 연세사랑(맘스홀릭 등)만 기재 및 체크하며, '근종힐링'카페에 업로드한 것은 별도 기재 및 체크하지 않음
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-grid">
                <div class="progress-card">
                    <div class="progress-name">태균</div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-태균"></div></div>
                    <div class="progress-text" id="progress-text-태균">0 / 20 완료</div>
                </div>
                <div class="progress-card">
                    <div class="progress-name">지은</div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-지은"></div></div>
                    <div class="progress-text" id="progress-text-지은">0 / 20 완료</div>
                </div>
                <div class="progress-card">
                    <div class="progress-name">이서</div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-이서"></div></div>
                    <div class="progress-text" id="progress-text-이서">0 / 20 완료</div>
                </div>
                <div class="progress-card">
                    <div class="progress-name">수정</div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-수정"></div></div>
                    <div class="progress-text" id="progress-text-수정">0 / 20 완료</div>
                </div>
                <div class="progress-card">
                    <div class="progress-name">해민</div>
                    <div class="progress-bar"><div class="progress-fill" id="progress-해민"></div></div>
                    <div class="progress-text" id="progress-text-해민">0 / 20 완료</div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>태균</th>
                        <th>지은</th>
                        <th>이서</th>
                        <th>수정</th>
                        <th>해민</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="person-column"><div class="checkbox-group" id="group-태균"></div></td>
                        <td class="person-column"><div class="checkbox-group" id="group-지은"></div></td>
                        <td class="person-column"><div class="checkbox-group" id="group-이서"></div></td>
                        <td class="person-column"><div class="checkbox-group" id="group-수정"></div></td>
                        <td class="person-column"><div class="checkbox-group" id="group-해민"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="controls-section">
            <button class="control-btn save" onclick="saveAllData()">💾 저장하기</button>
            <button class="control-btn reset" onclick="resetAllData()">🔄 초기화</button>
        </div>
    </div>

    <div class="save-feedback" id="saveFeedback">💾 저장되었습니다!</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, setDoc, doc, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA6VSdpxQ2PDkCrezW5n_Y69BVuvA3ig9g",
            authDomain: "soom-brand.firebaseapp.com",
            projectId: "soom-brand",
            storageBucket: "soom-brand.firebasestorage.app",
            messagingSenderId: "765427036681",
            appId: "1:765427036681:web:37add5f9e4fdbb8c30fed8"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.db = db;
            window.firebase = { collection, setDoc, doc, getDocs, onSnapshot };
            window.firebaseInitialized = true;
            console.log('🔥 Firebase 연결 완료!');
        } catch (error) {
            window.firebaseInitialized = false;
            console.error('Firebase 초기화 실패:', error);
        }
    </script>

    <script>
        // *** 멤버 목록 변경 (5명) ***
        const people = ['태균', '지은', '이서', '수정', '해민'];
        const totalItems = 20;
        let scheduleData = {};

        document.addEventListener('DOMContentLoaded', function() {
            initializeSchedule();
            initFirebaseConnection(); 
        });

        // HTML 구조 생성
        function initializeSchedule() {
            people.forEach(person => {
                const group = document.getElementById(`group-${person}`);
                if (!group) return;
                group.innerHTML = '';
                for (let i = 1; i <= totalItems; i++) {
                    const item = document.createElement('div');
                    item.className = 'checkbox-item';
                    item.innerHTML = `
                        <div class="item-number">${i}</div>
                        <input type="checkbox" id="${person}_${i}" onchange="toggleItem('${person}', ${i})">
                        <input type="text" class="mini-memo" id="memo_${person}_${i}" placeholder="메모" oninput="saveMemo('${person}', ${i})">
                    `;
                    group.appendChild(item);
                }
            });
        }
        
        // --- Firebase 및 데이터 처리 함수 ---

        async function initFirebaseConnection() {
            if (typeof window.firebaseInitialized === 'undefined') {
                setTimeout(initFirebaseConnection, 100); 
                return;
            }

            if (window.firebaseInitialized && window.db) {
                await loadScheduleFromFirebase(); 
                setupRealtimeSync(); 
                showSaveFeedback('🔥 Firebase 연결 완료!');
            } else {
                loadSavedData(); 
                showSaveFeedback('⚠️ Firebase 연결 실패 - 로컬 모드', true);
            }
        }
        
        function setupRealtimeSync() {
            if (!window.db) return;
            window.firebase.onSnapshot(window.firebase.collection(window.db, 'schedules'), (snapshot) => {
                snapshot.forEach((doc) => {
                    scheduleData[doc.id] = doc.data();
                });
                renderScheduleData();
                updateAllProgress();
            }, (error) => {
                console.error("실시간 동기화 실패:", error);
                showSaveFeedback('⚠️ 실시간 연결 실패', true);
            });
        }

        async function loadScheduleFromFirebase() {
            if (!window.db) return false;
            try {
                const querySnapshot = await window.firebase.getDocs(window.firebase.collection(window.db, 'schedules'));
                scheduleData = {};
                querySnapshot.forEach((doc) => {
                    scheduleData[doc.id] = doc.data();
                });
                renderScheduleData();
                updateAllProgress();
                return true;
            } catch (error) {
                console.error('Firebase 로드 실패:', error);
                loadSavedData();
                return false;
            }
        }

        function renderScheduleData() {
            people.forEach(person => {
                if (!scheduleData[person]) return;
                for (let i = 1; i <= totalItems; i++) {
                    const checkbox = document.getElementById(`${person}_${i}`);
                    const memo = document.getElementById(`memo_${person}_${i}`);
                    if (!checkbox || !memo) continue;

                    const itemData = scheduleData[person][i];
                    if (itemData) {
                        checkbox.checked = itemData.checked;
                        memo.value = itemData.memo || '';
                        const itemDiv = checkbox.closest('.checkbox-item');
                        if (itemData.checked) {
                            itemDiv.classList.add('completed');
                        } else {
                            itemDiv.classList.remove('completed');
                        }
                    }
                }
            });
        }

        async function saveScheduleToFirebase() {
            if (!window.db) return false;
            try {
                for (const person of people) {
                    const personData = {};
                    for (let i = 1; i <= totalItems; i++) {
                        const checkbox = document.getElementById(`${person}_${i}`);
                        const memo = document.getElementById(`memo_${person}_${i}`);
                        if (!checkbox || !memo) continue;
                        personData[i] = {
                            checked: checkbox.checked,
                            memo: memo.value
                        };
                    }
                    await window.firebase.setDoc(window.firebase.doc(window.db, 'schedules', person), personData);
                }
                return true;
            } catch (error) {
                console.error('Firebase 저장 실패:', error);
                return false;
            }
        }

        // --- 사용자 인터랙션 함수 ---

        async function toggleItem(person, itemNumber) {
            updateProgress(person);
            const checkbox = document.getElementById(`${person}_${itemNumber}`);
            if (checkbox) {
                const item = checkbox.closest('.checkbox-item');
                if (checkbox.checked) {
                    item.classList.add('completed');
                } else {
                    item.classList.remove('completed');
                }
            }
            await autoSave();
        }

        async function saveMemo(person, itemNumber) {
            await autoSave();
        }

        async function autoSave() {
            if (!window.firebaseInitialized) return; 
            const success = await saveScheduleToFirebase();
            if (!success) {
                showSaveFeedback('❌ 자동 저장 실패', true);
            }
        }
        
        async function saveAllData() {
            if (!window.firebaseInitialized) {
                saveDataToLocal();
                showSaveFeedback('⚠️ 오프라인 모드로 저장되었습니다!', true);
                return;
            }
            const success = await saveScheduleToFirebase();
            if (success) {
                showSaveFeedback('💾 모든 데이터가 저장되어 팀원들과 공유되었습니다!');
            } else {
                saveDataToLocal();
                showSaveFeedback('⚠️ 오프라인 모드로 저장되었습니다!', true);
            }
        }

        async function resetAllData() {
            if (confirm('모든 데이터를 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
                people.forEach(person => {
                    for (let i = 1; i <= totalItems; i++) {
                        const checkbox = document.getElementById(`${person}_${i}`);
                        const memo = document.getElementById(`memo_${person}_${i}`);
                        if(checkbox) checkbox.checked = false;
                        if(memo) memo.value = '';
                        if(checkbox) checkbox.closest('.checkbox-item').classList.remove('completed');
                    }
                });
                await saveAllData();
                updateAllProgress();
                showSaveFeedback('🔄 모든 데이터가 초기화되었습니다!');
            }
        }

        // --- UI 및 로컬 저장소 관련 함수 ---

        function updateProgress(person) {
            const checkedBoxes = document.querySelectorAll(`#group-${person} input[type="checkbox"]:checked`);
            const completed = checkedBoxes.length;
            const percentage = (completed / totalItems) * 100;
            
            const progressFill = document.getElementById(`progress-${person}`);
            const progressText = document.getElementById(`progress-text-${person}`);
            if(progressFill) progressFill.style.width = percentage + '%';
            if(progressText) progressText.textContent = `${completed} / ${totalItems} 완료`;
        }

        function updateAllProgress() {
            people.forEach(updateProgress);
        }

        function saveDataToLocal() {
            const localData = {};
            people.forEach(person => {
                localData[person] = {};
                for (let i = 1; i <= totalItems; i++) {
                    const checkbox = document.getElementById(`${person}_${i}`);
                    const memo = document.getElementById(`memo_${person}_${i}`);
                    if(checkbox && memo) {
                        localData[person][i] = { checked: checkbox.checked, memo: memo.value };
                    }
                }
            });
            localStorage.setItem('scheduleData', JSON.stringify(localData));
        }

        function loadSavedData() {
            const savedData = localStorage.getItem('scheduleData');
            if (savedData) {
                scheduleData = JSON.parse(savedData);
                renderScheduleData();
                updateAllProgress();
            }
        }

        function showSaveFeedback(message, isError = false) {
            const feedback = document.getElementById('saveFeedback');
            feedback.textContent = message;
            feedback.style.background = isError ? '#dc3545' : 'var(--bg-dark)';
            feedback.style.color = 'var(--text-light)';
            feedback.classList.add('show');
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000);
        }

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveAllData();
            }
        });
    </script>
</body>
</html>
